<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro - Chat Global</title>
    <style>
        :root { --wa-teal: #075e54; --wa-light-green: #25d366; --wa-bg: #e5ddd5; --wa-me: #dcf8c6; --wa-other: #ffffff; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:#111; display:flex; justify-content:center; height: 100vh; overflow: hidden; }
        .container { width:100%; max-width:450px; height:100%; background:#fff; display:flex; flex-direction:column; position: relative; }
        
        #auth { margin:auto; width:85%; text-align: center; display: flex; flex-direction: column; gap: 10px; }
        #auth input { width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; outline: none; }
        #auth button { width:100%; padding:12px; background: var(--wa-light-green); color:#fff; border:none; border-radius:8px; font-weight: bold; cursor: pointer; }

        #app { display:none; flex-direction:column; height:100%; background: var(--wa-bg); }
        .header { background: var(--wa-teal); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        
        #chatBox { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; font-size: 14px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .me { background: var(--wa-me); align-self: flex-end; border-top-right-radius: 0; }
        .other { background: var(--wa-other); align-self: flex-start; border-top-left-radius: 0; }
        
        .msg-user { font-weight: bold; font-size: 11px; margin-bottom: 3px; display: block; color: #075e54; }
        .msg-meta { font-size: 10px; color: #888; text-align: right; display: flex; justify-content: flex-end; align-items: center; gap: 5px; margin-top: 4px; }
        .delete-btn { color: #e53935; cursor: pointer; font-size: 10px; margin-right: 8px; text-decoration: underline; }

        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 5px; align-items: center; }
        .input-area input { flex: 1; border-radius: 25px; border: none; padding: 12px 15px; outline: none; font-size: 16px; }
        .btn-action { background: none; border: none; font-size: 22px; cursor: pointer; padding: 5px; }
        .btn-send { background: var(--wa-teal); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }

        #regModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center; }
        .modal-content { background:#fff; padding:20px; border-radius:10px; width:80%; max-width:300px; display:flex; flex-direction:column; gap:10px; }

        /* Chamada */
        #callBar { display:none; background: #25d366; color: white; padding: 10px; text-align: center; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

<div class="container">
    <div id="auth">
        <h2 style="color: #075e54;">Delivery De Drogas<br><small style="font-size: 12px; color: #666;">GRUPO CDL</small></h2>
        <input id="email" type="email" placeholder="E-mail">
        <input id="password" type="password" placeholder="Senha">
        <button onclick="authUser()">ENTRAR</button>
        <p style="font-size: 13px; color: #666; cursor: pointer;" onclick="toggleReg(true)">Cadastrar novo usuário</p>
    </div>

    <div id="app">
        <div class="header">
            <div><b>Chat Global</b></div>
            <div style="display:flex; gap:15px; align-items:center;">
                <span onclick="startGlobalCall()" style="cursor:pointer; font-size:20px;">📞</span>
                <button onclick="logout()" style="background:none; border:1px solid #fff; color:white; border-radius:4px; padding:4px 8px; cursor:pointer; font-size:11px;">SAIR</button>
            </div>
        </div>

        <div id="callBar" onclick="joinCall()">📞 Chamada em andamento... Clique para entrar</div>
        <div id="chatBox"></div>

        <div class="input-area">
            <button class="btn-action" onclick="openEmoji()">😊</button>
            <input id="msgInput" type="text" placeholder="Mensagem..." autocomplete="off">
            <button class="btn-send" id="btnSend">➤</button>
        </div>
    </div>
</div>

<div id="regModal">
    <div class="modal-content">
        <h3>Novo Cadastro</h3>
        <input id="reg-email" type="email" placeholder="E-mail">
        <input id="reg-password" type="password" placeholder="Senha">
        <button onclick="registerUser()" style="padding:10px; background:var(--wa-teal); color:#fff; border:none; border-radius:5px; font-weight:bold;">CADASTRAR</button>
        <button onclick="toggleReg(false)" style="background:none; border:none; color:#666;">Cancelar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, setDoc, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyA6gWb20jFrAYitLtujncJDOG8wwRCY0RU", 
        authDomain: "newchat-6c933.firebaseapp.com", 
        projectId: "newchat-6c933" 
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let lastMsgId = null;

    // --- AUTH ---
    window.authUser = async () => {
        const e = document.getElementById("email").value, p = document.getElementById("password").value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch { alert("Erro no login"); }
    };

    window.registerUser = async () => {
        const e = document.getElementById("reg-email").value, p = document.getElementById("reg-password").value;
        try {
            await createUserWithEmailAndPassword(auth, e, p); 
            alert("Sucesso!"); toggleReg(false);
        } catch (err) { alert("Erro: " + err.message); }
    };

    window.logout = () => signOut(auth);
    window.toggleReg = (s) => { document.getElementById("regModal").style.display = s ? "flex" : "none"; };

    onAuthStateChanged(auth, user => {
        if(user) { 
            currentUser = user; 
            document.getElementById("auth").style.display = "none"; 
            document.getElementById("app").style.display = "flex"; 
            listenGlobalChat();
            listenForGlobalCalls();
        } else { 
            document.getElementById("auth").style.display = "flex"; 
            document.getElementById("app").style.display = "none"; 
        }
    });

    // --- EMOJIS ---
    window.openEmoji = () => {
        // Usa o seletor nativo do teclado/sistema (mais rápido e leve)
        document.getElementById("msgInput").focus();
        if ('showPicker' in HTMLInputElement.prototype) {
             // Algumas builds modernas suportam nativamente
        }
        alert("Dica: Use o atalho (Win + Ponto) no PC ou o teclado do celular para emojis!");
    };

    // --- CHAT ---
    function listenGlobalChat() {
        const q = query(collection(db, "global_messages"), orderBy("time", "asc"));
        onSnapshot(q, snap => {
            const box = document.getElementById("chatBox");
            snap.docChanges().forEach(change => {
                if (change.type === "added") {
                    const data = change.doc.data();
                    if(data.user !== currentUser.email && lastMsgId !== null) document.getElementById("notifSound").play().catch(()=>{});
                    
                    const msgDiv = document.createElement("div");
                    const isMe = data.user === currentUser.email;
                    msgDiv.className = `msg ${isMe ? 'me' : 'other'}`;
                    msgDiv.id = `msg-${change.doc.id}`;
                    
                    msgDiv.innerHTML = `
                        <span class="msg-user">${isMe ? 'Você' : data.user.split('@')[0]}</span>
                        <span>${data.text}</span>
                        <div class="msg-meta">
                            ${isMe ? `<span class="delete-btn" onclick="deleteMsg('${change.doc.id}')">Apagar</span>` : ''}
                            ${new Date(data.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                        </div>`;
                    box.appendChild(msgDiv);
                    box.scrollTop = box.scrollHeight;
                    lastMsgId = change.doc.id;
                }
                if (change.type === "removed") document.getElementById(`msg-${change.doc.id}`)?.remove();
            });
        });
    }

    window.deleteMsg = async (id) => { if(confirm("Apagar?")) await deleteDoc(doc(db, "global_messages", id)); };

    const sendMsg = async () => {
        const input = document.getElementById("msgInput");
        const txt = input.value.trim();
        if(!txt) return;
        input.value = "";
        await addDoc(collection(db, "global_messages"), { user: currentUser.email, text: txt, time: Date.now() });
    };

    // --- LIGAÇÃO GLOBAL ---
    window.startGlobalCall = async () => {
        if(confirm("Iniciar uma chamada de voz para o grupo?")) {
            await setDoc(doc(db, "global_call", "current"), {
                active: true,
                startedBy: currentUser.email,
                time: Date.now()
            });
        }
    };

    window.joinCall = () => {
        alert("Entrando na conferência de voz...");
        // Aqui integraria com WebRTC para múltiplos usuários
    };

    function listenForGlobalCalls() {
        onSnapshot(doc(db, "global_call", "current"), (s) => {
            const data = s.data();
            const bar = document.getElementById("callBar");
            if(data && data.active) {
                bar.style.display = "block";
                bar.innerText = `📞 Chamada de ${data.startedBy.split('@')[0]} ativa! Clique para entrar`;
            } else {
                bar.style.display = "none";
            }
        });
    }

    document.getElementById("btnSend").onclick = sendMsg;
    document.getElementById("msgInput").onkeydown = (e) => { if(e.key === "Enter") sendMsg(); };

</script>
</body>
</html>
